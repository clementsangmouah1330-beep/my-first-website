<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Random Fun Facts</title>
<style>
  body {
      font-family: Arial, sans-serif;
          background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
              display: flex;
                  justify-content: center;
                      align-items: center;
                          height: 100vh;
                              margin: 0;
                                  color: white;
                                      text-align: center;
                                        }
                                        .container {
                                            background: rgba(255,255,255,0.1);
                                                padding: 40px;
                                                    border-radius: 20px;
                                                        backdrop-filter: blur(10px);
                                                          }
                                                            h1 { font-size: 2.5em; margin-bottom: 20px; }
                                                              #fact { font-size: 1.5em; margin: 30px 0; min-height: 60px; }
                                                                button {
                                                                    background: white;
                                                                        color: #667eea;
                                                                            border: none;
                                                                                padding: 15px 30px;
                                                                                    font-size: 1.2em;
                                                                                        border-radius: 10px;
                                                                                            cursor: pointer;
                                                                                                font-weight: bold;
                                                                                                  }
                                                                                                    button:hover { transform: scale(1.05); }
                                                                                                    </style>
                                                                                                    </head>
                                                                                                    <body>
                                                                                                      <div class="container">
                                                                                                          <h1>🤯 Random Fun Facts</h1>
                                                                                                              <p id="fact">Click the button for a fun fact!</p>
                                                                                                                  <button onclick="newFact()">New Fact</button>
                                                                                                                    </div>
                                                                                                                    <script>
                                                                                                                    const facts = [
                                                                                                                      "Honey never spoils. Archaeologists have eaten 3000 year old honey!",
                                                                                                                        "Octopuses have 3 hearts and blue blood.",
                                                                                                                          "A group of flamingos is called a flamboyance.",
                                                                                                                            "Bananas are berries, but strawberries aren't.",
                                                                                                                              "You can't hum while holding your nose shut.",
                                                                                                                                "Sharks are older than trees.",
                                                                                                                                  "A day on Venus is longer than a year on Venus."
                                                                                                                                  ];
                                                                                                                                  function newFact() {
                                                                                                                                    const randomIndex = Math.floor(Math.random() * facts.length);
                                                                                                                                      document.getElementById("fact").innerText = facts[randomIndex];
                                                                                                                                      }
                                                                                                                                      </script>
                                                                                                                                    
                                                                                                                                
                                                                                                                                      </body>
                                                                                                                                      </html>
